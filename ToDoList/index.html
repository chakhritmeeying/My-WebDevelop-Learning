<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="content">

        <h1>To-Do List</h1>
        <p id="demo">Add something that you want to do.</p>
        <input type="text" placeholder="Enter To-Do list" id="todoInput" />
        <button type="button" onclick="addList()" class="button addbutton">Add list</button>
        <button type="button" onclick="clearAll()" class="button clearbutton">Clear all</button>
        <div class="filters">
            <button onclick="filterTasks('all')" class="filter-btn active">ทั้งหมด</button>
            <button onclick="filterTasks('pending')" class="filter-btn">กำลังทำ</button>
            <button onclick="filterTasks('completed')" class="filter-btn">เสร็จแล้ว</button>
        </div>
        <div class="lists">
            <ul id="todoList"> </ul>
        </div>

    </div>


    <script src="todoScript.js"></script>
    <script>
        document.getElementById("todoInput").addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                addList();
            }
        });
    </script>
</body>

</html>
