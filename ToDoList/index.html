<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div>
        <h1>To-Do List</h1>
        <p id="demo">Add something that you want to do.</p>
        <input type="text" placeholder="Enter To-Do list" id="todoInput" />
        <button type="button" onclick="addList()">Add list</button>
        <ul id="todoList"> </ul>
    </div>

    <script src="todoscript.js"></script>
    <script>
        document.getElementById("todoInput").addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                addList();
            }
        });
    </script>
</body>

</html>
